<div class="scroll-horizontal">
  <ion-card class="stat-card">
    <ion-card-header>
      <ion-card-title>Total</ion-card-title>
      <div class="stat-number">{{ getTotal() }}</div>
      <ion-card-subtitle>Contenus vus</ion-card-subtitle>
    </ion-card-header>
  </ion-card>

  <ion-card class="stat-card">
    <ion-card-header>
      <ion-card-title>Séries</ion-card-title>
      <div class="stat-number">{{ getNbSeries() }}</div>
      <ion-card-subtitle>Séries suivies</ion-card-subtitle>
    </ion-card-header>
  </ion-card>

  <ion-card class="stat-card">
    <ion-card-header>
      <ion-card-title>Films</ion-card-title>
      <div class="stat-number">{{ getNbFilms() }}</div>
      <ion-card-subtitle>Films enregistrés</ion-card-subtitle>
    </ion-card-header>
  </ion-card>
</div>
