<h2>{{ titre }} :</h2>
<div class="scroll-horizontal">
  @for (item of listeSerieFilm; track item.id) {
    <div class="carte-serie">
      <img [src]="item.imageUrl" [alt]="item.name">
      <p>{{ item.name }}</p>
    </div>
  } @empty {
    <div class="ion-padding">
      <p>Aucun contenu dans "{{ titre }}"</p>
    </div>
  }
</div>
